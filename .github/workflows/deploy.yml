name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # mock 模式：resolveJanusUrl 直接回傳 DEFAULT_JANUS_URL，不打後端 API
          VITE_USE_MOCK: 'true'
          VITE_DEFAULT_JANUS_URL: ${{ secrets.VITE_DEFAULT_JANUS_URL }}
          VITE_JANUS_TOKEN: ${{ secrets.VITE_JANUS_TOKEN }}
          # TURN：控制 data channel 的 NAT 穿透需要
          VITE_TURN_URL: ${{ secrets.VITE_TURN_URL }}
          VITE_TURN_USERNAME: ${{ secrets.VITE_TURN_USERNAME }}
          VITE_TURN_CREDENTIAL: ${{ secrets.VITE_TURN_CREDENTIAL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
